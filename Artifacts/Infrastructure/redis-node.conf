# =============================================================================
# redis-node.conf
# Shared by all 6 Redis cluster nodes.
# Per-node overrides (requirepass, cluster-announce-hostname) are passed
# as CLI arguments in docker-compose.yml so they stay node-specific.
# =============================================================================

# ---------------------------------------------------------------------------
# Cluster
# ---------------------------------------------------------------------------
cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no        # Serve reads even if a shard is down

# ---------------------------------------------------------------------------
# Persistence — AOF everysec
# Spec: AOF everysec — at most 1 second of data loss.
# Redis is never the source of truth; Postgres is.
# AOF is a safety net, not a durability guarantee.
# ---------------------------------------------------------------------------
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes           # Don't block writes during BGREWRITEAOF
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots disabled — AOF is sufficient for our recovery SLA
save ""

# ---------------------------------------------------------------------------
# Memory
# Spec: allkeys-lru eviction, 4 GB cap per shard.
# In local dev, cap at 256mb to avoid exhausting laptop RAM.
# Override via REDIS_MAXMEMORY env var in production.
# ---------------------------------------------------------------------------
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 10                    # LRU approximation accuracy

# ---------------------------------------------------------------------------
# Keyspace notifications
# Spec: notify keyspace events Ex — expiry events for reservation TTL callbacks.
# Ex = Keyevent events for expired keys
# ---------------------------------------------------------------------------
notify-keyspace-events Ex

# ---------------------------------------------------------------------------
# Clients and networking
# ---------------------------------------------------------------------------
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10                                   # Background task frequency (10/sec)

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
loglevel notice
logfile ""                              # Log to stdout (Docker captures it)

# ---------------------------------------------------------------------------
# Security — password set via CLI arg (--requirepass) in compose
# Bind to all interfaces so cluster nodes can reach each other
# ---------------------------------------------------------------------------
bind 0.0.0.0
protected-mode no                       # Cluster mode manages its own auth

# ---------------------------------------------------------------------------
# Slow log — useful for profiling Lua script execution
# Spec: Lua scripts execute atomically; slow Lua blocks Redis
# ---------------------------------------------------------------------------
slowlog-log-slower-than 10000           # 10ms threshold
slowlog-max-len 128

# ---------------------------------------------------------------------------
# Lua
# ---------------------------------------------------------------------------
lua-time-limit 5000                     # 5s max Lua execution (abort after)