# =============================================================================
# redis-node.conf
# Shared by all 6 Redis cluster nodes.
# Per-node overrides (requirepass, cluster-announce-hostname) are passed
# as CLI arguments in docker-compose.yml so they stay node-specific.
# =============================================================================

# ---------------------------------------------------------------------------
# Cluster
# ---------------------------------------------------------------------------
cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000
# Serve reads even if a shard is down
cluster-require-full-coverage no

# ---------------------------------------------------------------------------
# Persistence — AOF everysec
# ---------------------------------------------------------------------------
appendonly yes
appendfsync everysec
# Don't block writes during BGREWRITEAOF
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots disabled — AOF is sufficient
save ""

# ---------------------------------------------------------------------------
# Memory — allkeys-lru eviction, 256mb cap in dev (4 GB per shard in production)
# ---------------------------------------------------------------------------
maxmemory 256mb
maxmemory-policy allkeys-lru
# LRU approximation accuracy
maxmemory-samples 10

# ---------------------------------------------------------------------------
# Keyspace notifications
# Ex = keyevent notifications for expired keys (reservation TTL callbacks)
# ---------------------------------------------------------------------------
notify-keyspace-events Ex

# ---------------------------------------------------------------------------
# Clients and networking
# ---------------------------------------------------------------------------
tcp-keepalive 300
timeout 0
tcp-backlog 511
# Background task frequency
hz 10

# ---------------------------------------------------------------------------
# Logging — empty string means log to stdout (Docker captures it)
# ---------------------------------------------------------------------------
loglevel notice
logfile ""

# ---------------------------------------------------------------------------
# Security
# Password is set via --requirepass CLI arg in docker-compose.yml
# bind 0.0.0.0 required so cluster nodes can reach each other
# ---------------------------------------------------------------------------
bind 0.0.0.0
# Cluster mode manages its own auth
protected-mode no

# ---------------------------------------------------------------------------
# Slow log — useful for profiling Lua script execution
# ---------------------------------------------------------------------------
# Log queries slower than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---------------------------------------------------------------------------
# Lua
# ---------------------------------------------------------------------------
# 5s max Lua execution before abort
lua-time-limit 5000