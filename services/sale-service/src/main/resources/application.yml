server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: sale-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SALES_DB_URL:jdbc:postgresql://localhost:5432/sales_db}
    username: ${SALES_DB_USER:flashsale}
    password: ${SALES_DB_PASSWORD:flashsale_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns the schema. Hibernate only validates its entity mappings against it at
    # startup — it must never auto-generate or alter DDL.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug
